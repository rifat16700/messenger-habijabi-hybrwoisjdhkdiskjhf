<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Panel — Hybrid Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f0f1a; --bg2: #161625; --bg3: #1e1e30;
      --primary: #6366f1; --primary2: #818cf8;
      --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #475569;
      --border: rgba(255,255,255,0.08);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
      padding: 40px; width: 360px;
    }
    .login-card h1 { font-size: 22px; margin-bottom: 6px; }
    .login-card p { color: var(--text2); font-size: 14px; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 15px; outline: none;
    }
    .field input:focus { border-color: var(--primary); }
    .btn-primary {
      width: 100%; padding: 12px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: white; font-size: 15px; font-weight: 600; cursor: pointer;
      border: none; margin-top: 4px; transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .err { color: var(--danger); font-size: 13px; margin-top: 8px; text-align:center; }

    /* ADMIN LAYOUT */
    #admin-screen { display: none; }
    .admin-layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .admin-sidebar {
      width: 220px; background: var(--bg2); border-right: 1px solid var(--border);
      padding: 24px 16px; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
    }
    .admin-logo { display: flex; align-items: center; gap: 10px; padding: 8px 12px; margin-bottom: 16px; }
    .admin-logo svg { color: var(--primary); }
    .admin-logo span { font-size: 15px; font-weight: 700; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 10px; cursor: pointer; font-size: 14px; color: var(--text2);
      transition: all 0.15s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: rgba(99,102,241,0.15); color: var(--primary); }
    .admin-sidebar-footer {
      margin-top: auto; padding: 12px; border-top: 1px solid var(--border);
    }
    .logout-btn {
      display: flex; align-items: center; gap: 8px; color: var(--danger);
      font-size: 14px; cursor: pointer; padding: 8px;
    }

    /* Main */
    .admin-main { flex: 1; padding: 32px; overflow-y: auto; }
    .page { display: none; }
    .page.active { display: block; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; display: flex; flex-direction: column; gap: 8px;
    }
    .stat-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 32px; font-weight: 700; }
    .stat-card.green .value { color: var(--success); }
    .stat-card.blue .value { color: var(--primary2); }
    .stat-card.yellow .value { color: var(--warning); }

    /* Table */
    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .table-toolbar { padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    .search-input {
      flex: 1; padding: 8px 14px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline:none;
    }
    .search-input:focus { border-color: var(--primary); }
    .refresh-btn {
      padding: 8px 14px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text2); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }
    .refresh-btn:hover { border-color: var(--primary); color: var(--primary); }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 12px 16px; text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
    td { padding: 13px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge.user { background: rgba(148,163,184,0.12); color: var(--text2); }
    .badge.moderator { background: rgba(99,102,241,0.15); color: var(--primary2); }
    .badge.admin { background: rgba(245,158,11,0.15); color: var(--warning); }
    .badge-online { display:inline-flex; align-items:center; gap:4px; font-size:12px; color: var(--success); }
    .badge-offline { font-size:12px; color: var(--text3); }

    /* Role dropdown */
    .role-select {
      padding: 5px 10px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer; outline: none;
    }
    .role-select:focus { border-color: var(--primary); }

    /* Delete btn */
    .del-btn {
      padding: 5px 10px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; color: var(--danger); font-size: 12px; cursor: pointer;
    }
    .del-btn:hover { background: rgba(239,68,68,0.2); }

    /* Avatar */
    .table-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: inline-flex; align-items:center; justify-content:center;
      font-size: 13px; font-weight: 700; color: white;
    }
    .user-cell { display: flex; align-items: center; gap: 10px; }

    /* Toast */
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast-item {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; font-size: 14px; min-width: 220px; animation: slideIn 0.3s ease;
    }
    .toast-item.success { border-color: var(--success); color: var(--success); }
    .toast-item.error { border-color: var(--danger); color: var(--danger); }
    @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }

    @media(max-width:600px) {
      .admin-sidebar { display: none; }
      .admin-main { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>Admin Panel</h1>
    <p>Hybrid Engine — Control Center</p>
    <div class="field">
      <label>Admin Password</label>
      <input type="password" id="admin-pwd" placeholder="Enter password" onkeydown="if(e.key==='Enter')adminLogin()"/>
    </div>
    <button class="btn-primary" onclick="adminLogin()">Sign In</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-screen">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>Admin</span>
      </div>

      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="nav-item" onclick="showPage('users')" id="nav-users">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </div>

      <div class="admin-sidebar-footer">
        <div class="logout-btn" onclick="adminLogout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </div>
      </div>
    </aside>

    <main class="admin-main">
      <!-- DASHBOARD -->
      <div class="page active" id="page-dashboard">
        <div class="page-title">Dashboard</div>
        <div class="stats-grid">
          <div class="stat-card blue">
            <div class="label">Total Users</div>
            <div class="value" id="stat-total">—</div>
          </div>
          <div class="stat-card green">
            <div class="label">Online Now</div>
            <div class="value" id="stat-online">—</div>
          </div>
          <div class="stat-card yellow">
            <div class="label">Active Calls</div>
            <div class="value" id="stat-calls">—</div>
          </div>
        </div>
        <p style="color:var(--text2);font-size:14px;">Last updated: <span id="stat-ts">—</span></p>
      </div>

      <!-- USERS -->
      <div class="page" id="page-users">
        <div class="page-title">User Management</div>
        <div class="table-wrap">
          <div class="table-toolbar">
            <input class="search-input" id="user-search" placeholder="Search users…" oninput="filterUsers(this.value)"/>
            <button class="refresh-btn" onclick="loadUsers()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
              Refresh
            </button>
          </div>
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Username</th>
                <th>Role</th>
                <th>Status</th>
                <th>Joined</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="6" style="text-align:center;color:var(--text3);padding:40px">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── Config ──
  const SERVER = location.origin.includes('pages.dev')
    ? 'https://rifat1670-app-messenger.hf.space'
    : location.origin;

  let adminToken = sessionStorage.getItem('he_admin_token') || '';
  let allUsers = [];

  // Auto-login if token exists
  if (adminToken) {
    showAdminPanel();
    loadDashboard();
    loadUsers();
  }

  // ── Auth ──
  async function adminLogin() {
    const pwd = document.getElementById('admin-pwd').value;
    const errEl = document.getElementById('login-err');
    errEl.textContent = '';
    try {
      const r = await fetch(`${SERVER}/admin/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Login failed');
      adminToken = d.token;
      sessionStorage.setItem('he_admin_token', adminToken);
      showAdminPanel();
      loadDashboard();
      loadUsers();
    } catch (e) {
      errEl.textContent = e.message;
    }
  }

  function adminLogout() {
    adminToken = '';
    sessionStorage.removeItem('he_admin_token');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-screen').style.display = 'none';
  }

  function showAdminPanel() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
  }

  // ── Navigation ──
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`page-${name}`).classList.add('active');
    document.getElementById(`nav-${name}`).classList.add('active');
  }

  // ── Dashboard ──
  async function loadDashboard() {
    try {
      const r = await fetch(`${SERVER}/admin/api/stats`, {
        headers: { 'x-admin-token': adminToken },
      });
      if (r.status === 401) { adminLogout(); return; }
      const d = await r.json();
      document.getElementById('stat-total').textContent = d.totalUsers;
      document.getElementById('stat-online').textContent = d.onlineNow;
      document.getElementById('stat-calls').textContent = d.conferenceRooms;
      document.getElementById('stat-ts').textContent = new Date(d.timestamp).toLocaleTimeString();
    } catch (e) { console.error(e); }
  }

  // ── Users ──
  async function loadUsers() {
    document.getElementById('users-tbody').innerHTML =
      '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:32px">Loading…</td></tr>';
    try {
      const r = await fetch(`${SERVER}/admin/api/users`, {
        headers: { 'x-admin-token': adminToken },
      });
      if (r.status === 401) { adminLogout(); return; }
      const d = await r.json();
      allUsers = d.users;
      renderUsers(allUsers);
    } catch (e) {
      toast('Failed to load users', 'error');
    }
  }

  function renderUsers(users) {
    const tbody = document.getElementById('users-tbody');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:32px">No users found</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td>
          <div class="user-cell">
            <div class="table-avatar" style="background:${u.avatarColor||'#6366f1'}">${initials(u.displayName)}</div>
            <div>
              <div style="font-weight:600">${esc(u.displayName)}</div>
              ${u.bio ? `<div style="font-size:11px;color:var(--text3)">${esc(u.bio)}</div>` : ''}
            </div>
          </div>
        </td>
        <td style="color:var(--text2)">@${esc(u.username)}</td>
        <td><span class="badge ${u.role}">${roleSVG(u.role)} ${u.role}</span></td>
        <td>${u.isOnline
          ? '<span class="badge-online">● Online</span>'
          : '<span class="badge-offline">Offline</span>'}</td>
        <td style="color:var(--text2);font-size:12px">${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '—'}</td>
        <td style="display:flex;gap:8px;align-items:center">
          <select class="role-select" onchange="changeRole('${u.id}', this.value)">
            <option value="user" ${u.role==='user'?'selected':''}>User</option>
            <option value="moderator" ${u.role==='moderator'?'selected':''}>Moderator</option>
            <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
          </select>
          <button class="del-btn" onclick="deleteUser('${u.id}','${esc(u.displayName)}')">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  function filterUsers(q) {
    const filtered = allUsers.filter(u =>
      u.username.toLowerCase().includes(q.toLowerCase()) ||
      u.displayName.toLowerCase().includes(q.toLowerCase())
    );
    renderUsers(filtered);
  }

  async function changeRole(userId, role) {
    try {
      const r = await fetch(`${SERVER}/admin/api/users/${userId}/role`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
        body: JSON.stringify({ role }),
      });
      if (!r.ok) throw new Error('Failed');
      toast(`Role updated to ${role}`, 'success');
      loadUsers();
    } catch (e) {
      toast('Failed to update role', 'error');
    }
  }

  async function deleteUser(userId, name) {
    if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
    try {
      const r = await fetch(`${SERVER}/admin/api/users/${userId}`, {
        method: 'DELETE',
        headers: { 'x-admin-token': adminToken },
      });
      if (!r.ok) throw new Error('Failed');
      toast(`User deleted`, 'success');
      loadUsers();
    } catch (e) {
      toast('Failed to delete user', 'error');
    }
  }

  // ── Helpers ──
  function initials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  }
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function roleSVG(role) {
    if (role === 'moderator') return '<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>';
    if (role === 'admin') return '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';
    return '';
  }
  function toast(msg, type='info') {
    const el = document.createElement('div');
    el.className = `toast-item ${type}`;
    el.textContent = msg;
    document.getElementById('toast').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  // Auto-refresh dashboard every 30s
  setInterval(loadDashboard, 30000);
</script>
</body>
</html>
