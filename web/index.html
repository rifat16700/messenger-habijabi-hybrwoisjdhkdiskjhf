<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hybrid Engine — Secure P2P Messenger</title>
  <meta name="description" content="Zero-cost, zero-trace, end-to-end encrypted P2P messenger." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/badges.css" />
</head>
<body>

<div id="app">

  <!-- ═══════════════════════════════════════
       AUTH VIEW
  ═══════════════════════════════════════ -->
  <div id="view-auth" class="view active">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <!-- Chat Bubble SVG -->
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h1>Hybrid Engine</h1>
        <p>Zero-cost · Zero-trace · P2P Chat</p>
      </div>

      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
        <button id="tab-register" class="auth-tab" onclick="switchAuthTab('register')">Create Account</button>
      </div>

      <!-- Login Form -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="field">
          <label>Username</label>
          <div class="input-wrap">
            <span class="icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="login-username" placeholder="your_username" autocomplete="username" required />
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <span class="icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="login-password" placeholder="Min 6 characters" autocomplete="current-password" required />
            <button type="button" class="eye-btn" onclick="togglePwd('login-password', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="btn-login">Sign In</button>
      </form>

      <!-- Register Form -->
      <form id="form-register" style="display:none" onsubmit="handleRegister(event)">
        <div class="field">
          <label>Display Name</label>
          <div class="input-wrap">
            <span class="icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="reg-displayname" placeholder="Your Name" required />
          </div>
        </div>
        <div class="field">
          <label>Username</label>
          <div class="input-wrap">
            <span class="icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>
            </span>
            <input type="text" id="reg-username" placeholder="unique_username" autocomplete="username" required />
          </div>
          <div class="err" id="err-username"></div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <span class="icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password" required />
            <button type="button" class="eye-btn" onclick="togglePwd('reg-password', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="btn-register">Create Account</button>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       MAIN VIEW (Sidebar + Chat)
  ═══════════════════════════════════════ -->
  <div id="view-main" class="view">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="auth-logo-icon" style="width:36px;height:36px;border-radius:10px;font-size:18px;flex-shrink:0;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <span class="sidebar-title">Hybrid Engine</span>
        <button class="icon-btn" title="Search users" onclick="focusSearch()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="icon-btn" title="My Profile" onclick="openProfileModal()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </button>
      </div>

      <div class="sidebar-tabs">
        <button class="sidebar-tab active" id="stab-all" onclick="switchSidebarTab('all')">All Users</button>
        <button class="sidebar-tab" id="stab-online" onclick="switchSidebarTab('online')">Online</button>
      </div>

      <div class="search-bar">
        <div class="search-input-wrap">
          <span>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="text" id="search-input" placeholder="Search users..." oninput="onSearch(this.value)" />
        </div>
      </div>

      <div class="user-list" id="user-list">
        <div class="no-chats">
          <div class="icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <p>No users yet.<br/>Register first or ask others to join.</p>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="avatar sm" id="my-avatar">?</div>
        <div>
          <div class="my-profile-name" id="my-displayname">Loading…</div>
          <div class="my-profile-sub" id="my-username">@—</div>
        </div>
        <button class="icon-btn" onclick="logout()" title="Sign Out">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- Chat Area -->
    <section class="chat-area" id="chat-area">

      <!-- Empty state -->
      <div class="chat-empty" id="chat-empty">
        <div class="big-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span>Select a user to start chatting</span>
      </div>

      <!-- Active chat (hidden until user selected) -->
      <div id="active-chat" style="display:none;flex-direction:column;height:100%;">

        <div class="chat-header">
          <button class="mobile-back-btn" onclick="closeChat()" title="Back">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="avatar sm" id="chat-avatar">?</div>
          <div class="chat-header-info">
            <div class="chat-header-name">
              <span id="chat-name">—</span>
              <span id="chat-role-badge"></span>
            </div>
            <div class="chat-header-status" id="chat-status">Offline</div>
          </div>
          <div class="chat-header-actions">
            <!-- Moderator Extra Action Button (hidden by default) -->
            <button class="call-btn mod-action-btn" title="Moderator Action" id="btn-mod-action" style="display:none; color:var(--warning)" onclick="alert('Moderator powers coming soon!')">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </button>
            <button class="call-btn" title="Audio Call" onclick="startCall('audio')" id="btn-audio-call">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.59 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.5a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.5 16l.42.92z"/></svg>
            </button>
            <button class="call-btn video" title="Video Call" onclick="startCall('video')" id="btn-video-call">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            </button>
          </div>
        </div>

        <div class="messages-area" id="messages-area">
          <!-- Messages injected here -->
        </div>

        <div class="chat-input-area">
          <button class="icon-btn" title="Attach File" onclick="document.getElementById('file-input').click()">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" id="file-input" style="display:none" onchange="handleFileUpload(event)" />
          <div class="msg-input-wrap">
            <input type="text" id="msg-input" placeholder="Type a message…" onkeydown="onMsgKeydown(event)" inputmode="text" />
          </div>
          <button class="send-btn" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>

      </div>
    </section>
  </div>

  <!-- ═══════════════════════════════════════
       CALL VIEW
  ═══════════════════════════════════════ -->
  <div id="view-call" class="view">
    <video id="remote-video" class="call-remote-video" autoplay playsinline></video>
    <video id="local-video" class="call-local-video" autoplay playsinline muted></video>

    <div class="call-overlay">
      <div class="call-info">
        <div class="call-caller-name" id="call-peer-name">—</div>
        <div class="call-status" id="call-status-text">Calling…</div>
        <div class="call-timer" id="call-timer" style="display:none">0:00</div>
      </div>

      <div class="call-controls">
        <button class="call-ctrl-btn" id="btn-mute" onclick="toggleMute()" title="Mute">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <span id="mute-label">Mute</span>
        </button>
        <button class="call-ctrl-btn end-call" onclick="endCall()" title="End Call">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.42 19.42 0 0 1 3.07 8.63 2 2 0 0 1 5 6.45h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11l-1.27 1.22z"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
        </button>
        <button class="call-ctrl-btn" id="btn-cam" onclick="toggleCamera()" title="Camera">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          <span id="cam-label">Camera</span>
        </button>
      </div>
    </div>
  </div>

</div><!-- /#app -->

<!-- ═══════════════════════════════════════
     INCOMING CALL MODAL
═══════════════════════════════════════ -->
<div class="modal-overlay" id="modal-incoming-call">
  <div class="modal-box">
    <div class="incoming-call-avatar" id="incoming-avatar">?</div>
    <div class="incoming-call-name" id="incoming-name">—</div>
    <div class="incoming-call-type" id="incoming-type">Incoming Video Call</div>
    <div class="incoming-call-btns">
      <button class="call-action-btn reject" onclick="rejectCall()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.42 19.42 0 0 1 3.07 8.63 2 2 0 0 1 5 6.45h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11l-1.27 1.22z"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
        <span>Decline</span>
      </button>
      <button class="call-action-btn accept" onclick="acceptCall()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.59 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.5a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.5 16l.42.92z"/></svg>
        <span>Accept</span>
      </button>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="modal-profile">
  <div class="modal-box">
    <div class="modal-title">My Profile</div>
    <div class="avatar-picker" id="profile-avatar-preview">?</div>
    <div class="field">
      <label>Display Name</label>
      <div class="input-wrap">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input type="text" id="profile-displayname" placeholder="Your display name" />
      </div>
    </div>
    <div class="field">
      <label>Bio</label>
      <div class="input-wrap">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </span>
        <input type="text" id="profile-bio" placeholder="Write something about yourself..." maxlength="200" />
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn-primary" style="flex:1" onclick="saveProfile()">Save Changes</button>
      <button class="btn-primary" style="flex:1;background:rgba(255,255,255,0.08);" onclick="closeModal('modal-profile')">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Ringtone -->
<audio id="ringtone" src="assets/ringtone.mp3" loop></audio>

<!-- ── Scripts ── -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging-compat.js"></script>

<script src="js/app.js"></script>
</body>
</html>
